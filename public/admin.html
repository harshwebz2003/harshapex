<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harsh Apex | Admin Control Center</title>
    <!-- Tailwind CSS CDN for premium styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d0b1a;
        }
        h1, h2, h3, h4 {
            font-family: 'Space Grotesk', sans-serif;
        }
        .glow-button {
            transition: all 0.3s ease;
        }
        .glow-button:hover {
            box-shadow: 0 0 25px rgba(184, 192, 255, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#1a1630] via-[#0d0b1a] to-[#0a0518]">

    <!-- Login Passcode Gate -->
    <div id="loginGate" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-[#0d0b1a] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#1a1630] via-[#0d0b1a] to-[#0a0518]">
        <div class="w-full max-w-md bg-[#16132a]/60 backdrop-blur-xl border border-[#b8c0ff]/15 rounded-3xl p-8 shadow-2xl relative overflow-hidden text-center">
            <h2 class="text-2xl font-bold bg-gradient-to-r from-[#b8c0ff] to-[#e7d8ff] bg-clip-text text-transparent mb-2">HARSH APEX ADMIN</h2>
            <p class="text-xs text-[#b8c0ff]/60 uppercase tracking-widest mb-6">Security Authorization Required</p>
            <div class="space-y-4">
                <input type="password" id="passcode" class="w-full bg-[#0d0b1a]/80 border border-[#b8c0ff]/10 focus:border-[#b8c0ff]/40 rounded-xl px-4 py-3 text-sm text-white text-center outline-none transition-colors placeholder:text-[#e7d8ff]/20" placeholder="Enter Admin Passcode">
                <button id="loginBtn" class="glow-button w-full px-6 py-3 rounded-xl bg-gradient-to-r from-[#b8c0ff] to-[#e7d8ff] text-[#0d0b1a] font-bold text-sm cursor-pointer">Verify Passcode</button>
                <p id="loginError" class="text-xs text-rose-400 mt-2 hidden">Incorrect passcode. Access Denied.</p>
            </div>
        </div>
    </div>

    <!-- Glassmorphic Container -->
    <div class="w-full max-w-2xl bg-[#16132a]/60 backdrop-blur-xl border border-[#b8c0ff]/15 rounded-3xl p-8 md:p-10 shadow-2xl relative overflow-hidden">
        <!-- Accent Glow Blob -->
        <div class="absolute top-0 right-0 w-48 h-48 bg-[#b8c0ff]/5 rounded-full blur-[80px] -mr-16 -mt-16 pointer-events-none"></div>

        <!-- Header -->
        <div class="flex items-center justify-between mb-8 border-b border-[#b8c0ff]/10 pb-6">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-[#b8c0ff] to-[#e7d8ff] bg-clip-text text-transparent">HARSH APEX</h1>
                <p class="text-xs tracking-wider text-[#b8c0ff]/55 uppercase mt-1">Website Configuration Terminal</p>
            </div>
            <div class="h-10 w-10 rounded-full border border-[#b8c0ff]/20 flex items-center justify-center bg-[#b8c0ff]/5">
                <span class="h-2.5 w-2.5 rounded-full bg-[#b8c0ff] animate-pulse"></span>
            </div>
        </div>

        <!-- Form fields -->
        <div class="space-y-6">
            <!-- Hero Settings Section -->
            <div>
                <h2 class="text-sm font-semibold text-[#b8c0ff] uppercase tracking-wider mb-4 border-l-2 border-[#b8c0ff] pl-3">Hero Section Configurations</h2>
                <div class="space-y-4">
                    <div>
                        <label for="heroTitle" class="block text-xs font-medium text-[#e7d8ff]/70 mb-2">Main Hero Title</label>
                        <input type="text" id="heroTitle" class="w-full bg-[#0d0b1a]/80 border border-[#b8c0ff]/10 focus:border-[#b8c0ff]/40 rounded-xl px-4 py-3 text-sm text-white outline-none transition-colors placeholder:text-[#e7d8ff]/20" placeholder="e.g., Designed for Growth. Built for Conversions.">
                    </div>
                    <div>
                        <label for="heroDesc" class="block text-xs font-medium text-[#e7d8ff]/70 mb-2">Hero Description</label>
                        <textarea id="heroDesc" rows="3" class="w-full bg-[#0d0b1a]/80 border border-[#b8c0ff]/10 focus:border-[#b8c0ff]/40 rounded-xl px-4 py-3 text-sm text-white outline-none transition-colors placeholder:text-[#e7d8ff]/20 resize-none" placeholder="Enter short subtitle intro text..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Project Settings Section -->
            <div>
                <h2 class="text-sm font-semibold text-[#b8c0ff] uppercase tracking-wider mb-4 border-l-2 border-[#b8c0ff] pl-3">Featured Showcase</h2>
                <div class="space-y-4">
                    <div>
                        <label for="projectTitle" class="block text-xs font-medium text-[#e7d8ff]/70 mb-2">Project 1 Title</label>
                        <input type="text" id="projectTitle" class="w-full bg-[#0d0b1a]/80 border border-[#b8c0ff]/10 focus:border-[#b8c0ff]/40 rounded-xl px-4 py-3 text-sm text-white outline-none transition-colors placeholder:text-[#e7d8ff]/20" placeholder="e.g., Hiruzone Tourism">
                    </div>
                    <div>
                        <label for="projectImg" class="block text-xs font-medium text-[#e7d8ff]/70 mb-2">Project 1 Image URL</label>
                        <input type="url" id="projectImg" class="w-full bg-[#0d0b1a]/80 border border-[#b8c0ff]/10 focus:border-[#b8c0ff]/40 rounded-xl px-4 py-3 text-sm text-white outline-none transition-colors placeholder:text-[#e7d8ff]/20" placeholder="e.g., /projects/Hiruzone Tourism.png">
                    </div>
                </div>
            </div>

            <!-- Stats Section -->
            <div>
                <h2 class="text-sm font-semibold text-[#b8c0ff] uppercase tracking-wider mb-4 border-l-2 border-[#b8c0ff] pl-3">Metrics & Statistics</h2>
                <div>
                    <label for="activeClients" class="block text-xs font-medium text-[#e7d8ff]/70 mb-2">Active Clients Count</label>
                    <input type="text" id="activeClients" class="w-full bg-[#0d0b1a]/80 border border-[#b8c0ff]/10 focus:border-[#b8c0ff]/40 rounded-xl px-4 py-3 text-sm text-white outline-none transition-colors placeholder:text-[#e7d8ff]/20" placeholder="e.g., 50+">
                </div>
            </div>

            <!-- Save Action -->
            <div class="pt-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div id="statusMessage" class="text-xs font-medium text-emerald-400 opacity-0 transition-opacity duration-300 flex items-center gap-2">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                    <span>Configurations stored successfully!</span>
                </div>
                <button id="saveBtn" class="glow-button w-full sm:w-auto px-8 py-4 rounded-xl bg-gradient-to-r from-[#b8c0ff] to-[#e7d8ff] text-[#0d0b1a] font-bold text-sm flex items-center justify-center gap-2 cursor-pointer">
                    <svg id="spinner" class="animate-spin -ml-1 mr-2 h-4 w-4 text-[#0d0b1a] hidden" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="btnText">Save Changes</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase Integration Script -->
    <script type="module">
        // Import Firebase SDK Modules (v10+)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // TODO: Replace with your actual Firebase Configuration keys
        const firebaseConfig = {
            apiKey: "AIzaSyDc_iMG5ydjPhRlszWtSHK01YLC_B3skI4",
            authDomain: "harshapex-7e3f7.firebaseapp.com",
            databaseURL: "https://harshapex-7e3f7-default-rtdb.firebaseio.com",
            projectId: "harshapex-7e3f7",
            storageBucket: "harshapex-7e3f7.firebasestorage.app",
            messagingSenderId: "977211625717",
            appId: "1:977211625717:web:15dc38acd6ae563a3ef5bc",
            measurementId: "G-PXVM3SSESQ"
        };

        // Initialize Firebase Apps
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Reference target node 'site_settings'
        const settingsRef = ref(db, 'site_settings');

        const heroTitleInput = document.getElementById('heroTitle');
        const heroDescInput = document.getElementById('heroDesc');
        const projectTitleInput = document.getElementById('projectTitle');
        const projectImgInput = document.getElementById('projectImg');
        const activeClientsInput = document.getElementById('activeClients');
        const saveBtn = document.getElementById('saveBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const statusMessage = document.getElementById('statusMessage');

        // Passcode Gate Verification Logic
        const loginGate = document.getElementById('loginGate');
        const passcode = document.getElementById('passcode');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        loginBtn.addEventListener('click', () => {
            if (passcode.value === 'harshapex2026') {
                loginGate.classList.add('hidden');
            } else {
                loginError.classList.remove('hidden');
            }
        });

        passcode.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });

        // Fetch existing database configuration on load
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const snapshot = await get(settingsRef);
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.heroTitle) heroTitleInput.value = data.heroTitle;
                    if (data.heroDesc) heroDescInput.value = data.heroDesc;
                    if (data.projectTitle) projectTitleInput.value = data.projectTitle;
                    if (data.projectImg) projectImgInput.value = data.projectImg;
                    if (data.activeClients) activeClientsInput.value = data.activeClients;
                }
            } catch (error) {
                console.error("Error loading data from Firebase:", error);
            }
        });

        // Save new settings on click
        saveBtn.addEventListener('click', async () => {
            // Show Loading State
            saveBtn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.textContent = "Saving...";
            statusMessage.classList.add('opacity-0');

            const payload = {
                heroTitle: heroTitleInput.value,
                heroDesc: heroDescInput.value,
                projectTitle: projectTitleInput.value,
                projectImg: projectImgInput.value,
                activeClients: activeClientsInput.value,
                lastUpdated: new Date().toISOString()
            };

            try {
                // Save data to Firebase default path 'site_settings'
                await set(settingsRef, payload);
                
                // Show Success Toast/Message
                statusMessage.classList.remove('opacity-0');
                setTimeout(() => {
                    statusMessage.classList.add('opacity-0');
                }, 4000);

            } catch (error) {
                console.error("Error writing data to Firebase:", error);
                alert("Failed to save. Check your Firebase console config or security rules.");
            } finally {
                // Restore Button State
                saveBtn.disabled = false;
                spinner.classList.add('hidden');
                btnText.textContent = "Save Changes";
            }
        });
    </script>
</body>
</html>
